# Toyxona — live kamera (WebSocket) + Django
# Fayl: /etc/nginx/sites-available/toyxona
# ln -s /etc/nginx/sites-available/toyxona /etc/nginx/sites-enabled/

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream toyxona_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name 176.101.56.247;

    client_max_body_size 50M;
    resolver 127.0.0.1 8.8.8.8 valid=30s ipv6=off;

    # Django STATIC_URL = /static/backend/
    location /static/backend/ {
        alias /var/www/toyxona/static/backend/;
    }

    location /media/ {
        alias /var/www/toyxona/media/;
    }

    # Django token tekshiruvi (ichki)
    location = /internal/camera-verify {
        internal;
        proxy_pass http://toyxona_app/camera/verify/;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    # Live video WebSocket — edge serverga (go2rtc)
    location /camera/stream/ {
        auth_request /internal/camera-verify;
        auth_request_set $device_sn $upstream_http_x_device_sn;
        auth_request_set $edge_ip $upstream_http_x_server_ip;
        auth_request_set $edge_auth $upstream_http_x_edge_authorization;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $edge_ip:1984;
        proxy_set_header Authorization $edge_auth;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # mode brauzer/go2rtc orasida WS orqali kelishiladi (SmartBozor kabi)
        set $edge_upstream "http://$edge_ip:1984/api/ws?src=$device_sn";
        proxy_pass $edge_upstream;
    }

    location / {
        proxy_pass http://toyxona_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
